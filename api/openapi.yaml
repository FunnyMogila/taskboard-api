openapi: 3.0.3
info:
  title: TaskBoard API
  version: 1.0.0

paths:
  /users:
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: created

  /projects:
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: created

  /projects/members:
    post:
      operationId: addProjectMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberRequest'
      responses:
        '200':
          description: ok

  /tasks:
    post:
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: created

  /tasks/status:
    patch:
      operationId: updateTaskStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskStatusRequest'
      responses:
        '200':
          description: updated

  /tasks/comments:
    post:
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: created

components:
  schemas:
    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    AddProjectMemberRequest:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: integer
          format: int64
        role:
          type: string

    CreateTaskRequest:
      type: object
      required: [project_id, title]
      properties:
        project_id:
          type: integer
          format: int64
        assignee_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string

    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string

    CreateCommentRequest:
      type: object
      required: [author_id, text]
      properties:
        author_id:
          type: integer
          format: int64
        text:
          type: string